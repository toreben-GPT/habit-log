<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#f4f5f7" />
  <title>翔太さん専用 記録カレンダー v2.1</title>
  <style>
    :root {
      --bg: #f4f5f7;
      --card: #ffffff;
      --text: #17181c;
      --muted: #838894;
      --line: #e5e7eb;
      --navy: #101828;
      --amber: #f0b423;
      --blue: #4ea8ff;
      --violet: #b084ff;
      --red: #ef5350;
      --red-soft: #fff1f1;
      --shadow: 0 8px 24px rgba(17, 24, 39, 0.08);
      --radius-xl: 24px;
      --radius-lg: 18px;
      --radius-md: 14px;
      --safe-top: env(safe-area-inset-top, 0px);
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Hiragino Sans", "Yu Gothic", sans-serif; }
    body { min-height: 100dvh; }
    button, input { font: inherit; }

    .app {
      width: min(430px, 100vw);
      margin: 0 auto;
      min-height: 100dvh;
      padding: calc(10px + var(--safe-top)) 12px calc(88px + var(--safe-bottom));
      background: var(--bg);
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 15;
      padding-bottom: 8px;
      background: linear-gradient(180deg, rgba(244,245,247,.98), rgba(244,245,247,.94) 70%, rgba(244,245,247,0));
      backdrop-filter: blur(8px);
    }

    .month-row {
      display: grid;
      grid-template-columns: 40px 1fr auto 40px;
      gap: 8px;
      align-items: center;
    }

    .icon-btn, .tab-btn, .primary-btn, .secondary-btn, .chip-btn {
      border: none;
      cursor: pointer;
      transition: .16s ease;
    }
    .icon-btn:active, .tab-btn:active, .primary-btn:active, .secondary-btn:active, .chip-btn:active { transform: scale(.98); }

    .icon-btn {
      height: 40px;
      width: 40px;
      border-radius: 13px;
      background: #fff;
      border: 1px solid var(--line);
      color: var(--text);
      font-weight: 900;
      font-size: 18px;
      box-shadow: 0 1px 2px rgba(0,0,0,.03);
    }

    .month-title-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      min-width: 0;
    }
    .month-title {
      font-size: 28px;
      font-weight: 950;
      letter-spacing: -.05em;
      white-space: nowrap;
    }
    .today-mini {
      padding: 0 12px;
      height: 40px;
      border-radius: 13px;
      background: var(--navy);
      color: #fff;
      font-weight: 800;
      font-size: 14px;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 10px;
    }
    .tab-btn {
      height: 42px;
      border-radius: 15px;
      background: rgba(255,255,255,.78);
      border: 1px solid var(--line);
      color: var(--muted);
      font-size: 14px;
      font-weight: 850;
    }
    .tab-btn.active {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    .screen { display: none; }
    .screen.active { display: block; }

    .card {
      background: var(--card);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
      border: 1px solid rgba(255,255,255,.85);
      padding: 14px;
      margin-top: 12px;
    }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 8px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 850;
      text-align: center;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-cell {
      min-height: 56px;
      border-radius: 14px;
      border: 1px solid #e8eaf0;
      background: #fff;
      padding: 5px 4px 4px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }
    .day-cell.outside {
      background: #f7f8fa;
      color: #b6bcc8;
    }
    .day-cell.today {
      border-color: rgba(37,99,235,.35);
      box-shadow: inset 0 0 0 1px rgba(37,99,235,.16);
    }
    .day-cell.selected {
      border-color: rgba(16,24,40,.7);
      box-shadow: inset 0 0 0 1px rgba(16,24,40,.18);
    }
    .day-cell.missing {
      border-color: rgba(239,83,80,.55);
      background: linear-gradient(180deg, #fff 0%, #fffafa 100%);
    }

    .day-top {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      min-height: 17px;
    }
    .day-num {
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: -.03em;
      color: #3e4756;
    }
    .outside .day-num { color: #b7bdc8; }
    .day-cell.today .day-num {
      background: #2563eb;
      color: #fff;
      width: 24px;
      height: 24px;
      border-radius: 999px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
    }

    .red-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--red);
      box-shadow: 0 0 0 3px rgba(239,83,80,.12);
      flex: 0 0 auto;
      margin-top: 2px;
    }

    .dots {
      display: flex;
      gap: 4px;
      align-items: center;
      justify-content: center;
      min-height: 14px;
      padding-bottom: 2px;
    }
    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      flex: 0 0 auto;
    }
    .dot.alcohol { background: var(--amber); }
    .dot.workout { background: var(--blue); }
    .dot.fx { background: var(--violet); }
    .dot.missing { background: var(--red); }

    .selected-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }
    .section-title {
      margin: 0;
      font-size: 20px;
      font-weight: 950;
      letter-spacing: -.04em;
    }
    .selected-date {
      color: var(--muted);
      font-weight: 800;
      font-size: 13px;
    }

    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 12px;
    }
    .state-pill {
      border-radius: 999px;
      padding: 8px 12px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }
    .state-pill.alcohol { background: #fff4d1; color: #ad7600; }
    .state-pill.workout { background: #eaf5ff; color: #1271c8; }
    .state-pill.fx { background: #f1eaff; color: #7f54cc; }
    .state-pill.missing { background: var(--red-soft); color: #bf2d2b; }
    .state-pill.none { background: #f3f4f6; color: #707887; }

    .editor-group + .editor-group { margin-top: 14px; }
    .editor-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .editor-label {
      font-size: 15px;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .editor-note { font-size: 12px; color: var(--muted); font-weight: 700; }

    .chip-grid {
      display: grid;
      gap: 8px;
    }
    .chip-grid.two { grid-template-columns: repeat(2, 1fr); }
    .chip-grid.three { grid-template-columns: repeat(3, 1fr); }
    .chip-btn {
      min-height: 42px;
      border-radius: 14px;
      background: #fff;
      border: 1px solid var(--line);
      color: #5d6675;
      font-size: 13px;
      font-weight: 850;
      padding: 0 10px;
    }
    .chip-btn.active {
      background: var(--navy);
      color: #fff;
      border-color: var(--navy);
    }

    .actions-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-top: 14px;
    }
    .secondary-btn, .primary-btn {
      min-height: 44px;
      border-radius: 15px;
      font-size: 14px;
      font-weight: 900;
      padding: 0 12px;
    }
    .primary-btn { background: var(--navy); color: #fff; }
    .secondary-btn { background: #fff; border: 1px solid var(--line); color: #616978; }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-top: 6px;
    }
    .stat-box {
      border-radius: 18px;
      padding: 12px 12px 10px;
    }
    .stat-box h3 {
      margin: 0;
      font-size: 12px;
      font-weight: 750;
      color: #656d7b;
    }
    .stat-box .num {
      margin-top: 6px;
      font-size: 34px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -.05em;
    }
    .stat-box.alcohol { background: #fff4d1; }
    .stat-box.workout { background: #eaf5ff; }
    .stat-box.fx { background: #f1eaff; }
    .stat-box.missing { background: #fff1f1; }

    .sub-title {
      margin: 14px 0 8px;
      font-size: 14px;
      font-weight: 900;
      letter-spacing: -.02em;
    }
    .pill-list { display: flex; flex-wrap: wrap; gap: 8px; }
    .mini-pill {
      padding: 7px 11px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 900;
      line-height: 1;
    }
    .mini-pill.workout { background: #eaf5ff; color: #1271c8; }
    .mini-pill.fx { background: #f1eaff; color: #7f54cc; }

    .export-grid { display: grid; gap: 10px; }
    .export-box {
      border-radius: 18px;
      background: #f7f8fa;
      border: 1px solid var(--line);
      padding: 12px;
    }
    .export-head {
      font-size: 14px;
      font-weight: 900;
      margin-bottom: 10px;
    }
    .export-box .primary-btn, .export-box .secondary-btn { width: 100%; }
    .export-stack { display: grid; gap: 8px; }
    .date-inputs {
      display: grid;
      gap: 8px;
      margin-bottom: 8px;
    }
    .date-inputs label {
      font-size: 12px;
      font-weight: 800;
      color: var(--muted);
      margin-bottom: 4px;
      display: block;
    }
    .date-inputs input {
      width: 100%;
      min-height: 44px;
      padding: 0 12px;
      border-radius: 14px;
      border: 1px solid var(--line);
      background: #fff;
    }

    .helper-box {
      margin-top: 10px;
      border-radius: 16px;
      background: #fff;
      border: 1px solid var(--line);
      padding: 12px;
      font-size: 12px;
      color: #616978;
      line-height: 1.5;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(24px + var(--safe-bottom));
      transform: translateX(-50%) translateY(20px);
      background: rgba(16,24,40,.92);
      color: #fff;
      padding: 12px 16px;
      border-radius: 14px;
      font-size: 13px;
      font-weight: 850;
      opacity: 0;
      pointer-events: none;
      transition: .22s ease;
      z-index: 30;
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 370px) {
      .month-title { font-size: 24px; }
      .day-cell { min-height: 52px; }
      .day-num { font-size: 14px; }
      .dot { width: 8px; height: 8px; }
      .chip-btn { font-size: 12px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div class="month-row">
        <button class="icon-btn" id="prevMonth" aria-label="前月">‹</button>
        <div class="month-title-wrap">
          <div class="month-title" id="monthTitle">2026年4月</div>
        </div>
        <button class="today-mini" id="todayBtn">今日</button>
        <button class="icon-btn" id="nextMonth" aria-label="次月">›</button>
      </div>
      <div class="tabs">
        <button class="tab-btn active" data-screen="calendar">カレンダー</button>
        <button class="tab-btn" data-screen="summary">集計</button>
        <button class="tab-btn" data-screen="export">出力</button>
      </div>
    </div>

    <section class="screen active" id="screen-calendar">
      <div class="card">
        <div class="weekdays">
          <div>月</div><div>火</div><div>水</div><div>木</div><div>金</div><div>土</div><div>日</div>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>

      <div class="card">
        <div class="selected-header">
          <div>
            <h2 class="section-title">選択日の詳細</h2>
            <div class="selected-date" id="selectedDateText"></div>
          </div>
          <button class="secondary-btn" id="resetSelectedBtn" style="min-height:40px; padding:0 14px;">未入力に戻す</button>
        </div>

        <div class="pill-row" id="selectedPills"></div>

        <div class="editor-group">
          <div class="editor-head">
            <div class="editor-label">禁酒</div>
            <div class="editor-note">達成時だけ黄丸</div>
          </div>
          <div class="chip-grid two" id="alcoholOptions"></div>
        </div>

        <div class="editor-group">
          <div class="editor-head">
            <div class="editor-label">筋トレ</div>
            <div class="editor-note">実施時だけ青丸</div>
          </div>
          <div class="chip-grid three" id="workoutOptions"></div>
        </div>

        <div class="editor-group">
          <div class="editor-head">
            <div class="editor-label">FX勉強</div>
            <div class="editor-note">実施時だけ紫丸</div>
          </div>
          <div class="chip-grid two" id="fxOptions"></div>
        </div>

        <div class="actions-row">
          <button class="secondary-btn" id="copyDayBtn">この日を要約コピー</button>
          <button class="primary-btn" id="openTodayBtn">今日を選択</button>
        </div>
      </div>
    </section>

    <section class="screen" id="screen-summary">
      <div class="card">
        <h2 class="section-title">月次サマリー</h2>
        <div class="stats-grid">
          <div class="stat-box alcohol">
            <h3>禁酒達成日数</h3>
            <div class="num" id="statAlcohol">0</div>
          </div>
          <div class="stat-box workout">
            <h3>筋トレ実施日数</h3>
            <div class="num" id="statWorkout">0</div>
          </div>
          <div class="stat-box fx">
            <h3>FX勉強実施日数</h3>
            <div class="num" id="statFx">0</div>
          </div>
          <div class="stat-box missing">
            <h3>要入力日数</h3>
            <div class="num" id="statMissing">0</div>
          </div>
        </div>

        <div class="sub-title">筋トレ内訳</div>
        <div class="pill-list" id="workoutBreakdown"></div>

        <div class="sub-title">FX勉強内訳</div>
        <div class="pill-list" id="fxBreakdown"></div>
      </div>
    </section>

    <section class="screen" id="screen-export">
      <div class="card">
        <h2 class="section-title">CSV / AI説明 出力</h2>
        <div class="export-grid">
          <div class="export-box">
            <div class="export-head">今月</div>
            <div class="export-stack">
              <button class="primary-btn" id="exportMonthCsv">今月CSV</button>
              <button class="secondary-btn" id="exportMonthGuide">今月AI説明</button>
              <button class="secondary-btn" id="copyMonthPrompt">今月分析文をコピー</button>
            </div>
          </div>

          <div class="export-box">
            <div class="export-head">全期間</div>
            <div class="export-stack">
              <button class="primary-btn" id="exportAllCsv">全期間CSV</button>
              <button class="secondary-btn" id="exportAllGuide">全期間AI説明</button>
              <button class="secondary-btn" id="copyAllPrompt">全期間分析文をコピー</button>
            </div>
          </div>

          <div class="export-box">
            <div class="export-head">期間指定</div>
            <div class="date-inputs">
              <div>
                <label for="rangeStart">開始日</label>
                <input type="date" id="rangeStart" />
              </div>
              <div>
                <label for="rangeEnd">終了日</label>
                <input type="date" id="rangeEnd" />
              </div>
            </div>
            <div class="export-stack">
              <button class="primary-btn" id="exportRangeCsv">期間指定CSV</button>
              <button class="secondary-btn" id="exportRangeGuide">期間指定AI説明</button>
              <button class="secondary-btn" id="copyRangePrompt">期間指定分析文をコピー</button>
            </div>
          </div>
        </div>

        <div class="helper-box">
          CSVは日本語列名で出力。AI説明は別テキストで出力。未入力と「なし」は別扱いで、実施日数に未入力は絶対に入らない設計です。
        </div>
      </div>
    </section>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'shota_habit_calendar_v2_1';

    const alcoholOptions = [
      { value: 'success', label: '達成' },
      { value: 'fail', label: '未達' },
    ];
    const workoutOptions = [
      { value: 'none', label: 'なし' },
      { value: 'basic', label: '筋トレ' },
      { value: 'fullBody', label: '筋トレ:全身' },
      { value: 'legs', label: '筋トレ:脚' },
      { value: 'abs', label: '筋トレ:腹筋' },
    ];
    const fxOptions = [
      { value: 'none', label: 'なし' },
      { value: 'level1', label: 'FX勉強○' },
      { value: 'level2', label: 'FX勉強○○' },
      { value: 'level3', label: 'FX勉強○○○' },
    ];

    const displayMap = {
      noAlcoholStatus: { unrecorded: '未入力', success: '達成', fail: '未達' },
      workoutStatus: { unrecorded: '未入力', none: 'なし', basic: '筋トレ', fullBody: '筋トレ:全身', legs: '筋トレ:脚', abs: '筋トレ:腹筋' },
      fxStudyStatus: { unrecorded: '未入力', none: 'なし', level1: 'FX勉強○', level2: 'FX勉強○○', level3: 'FX勉強○○○' },
    };

    const state = {
      records: {},
      currentMonth: startOfMonth(new Date()),
      selectedDate: formatDate(new Date()),
      screen: 'calendar',
    };

    const $ = (id) => document.getElementById(id);

    function showToast(message) {
      const toast = $('toast');
      toast.textContent = message;
      toast.classList.add('show');
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => toast.classList.remove('show'), 1600);
    }

    function formatDate(date) {
      const y = date.getFullYear();
      const m = String(date.getMonth() + 1).padStart(2, '0');
      const d = String(date.getDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function jpMonth(date) {
      return `${date.getFullYear()}年${date.getMonth() + 1}月`;
    }

    function parseDateKey(dateStr) {
      const [y, m, d] = dateStr.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function startOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth(), 1);
    }

    function endOfMonth(date) {
      return new Date(date.getFullYear(), date.getMonth() + 1, 0);
    }

    function addMonths(date, diff) {
      return new Date(date.getFullYear(), date.getMonth() + diff, 1);
    }

    function mondayIndex(date) {
      return (date.getDay() + 6) % 7;
    }

    function emptyRecord(dateStr) {
      return {
        date: dateStr,
        noAlcoholStatus: 'unrecorded',
        workoutStatus: 'unrecorded',
        fxStudyStatus: 'unrecorded',
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
      };
    }

    function getRecord(dateStr) {
      return state.records[dateStr] || emptyRecord(dateStr);
    }

    function saveRecords() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state.records));
    }

    function loadRecords() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const parsed = JSON.parse(raw);
        if (parsed && typeof parsed === 'object') state.records = parsed;
      } catch (e) {
        console.error(e);
      }
    }

    function isToday(dateStr) {
      return dateStr === formatDate(new Date());
    }

    function isFuture(dateStr) {
      return dateStr > formatDate(new Date());
    }

    function hasMissing(record, dateStr) {
      if (isFuture(dateStr)) return false;
      return [record.noAlcoholStatus, record.workoutStatus, record.fxStudyStatus].some(v => v === 'unrecorded');
    }

    function alcoholPositive(record) {
      return record.noAlcoholStatus === 'success';
    }

    function workoutPositive(record) {
      return ['basic', 'fullBody', 'legs', 'abs'].includes(record.workoutStatus);
    }

    function fxPositive(record) {
      return ['level1', 'level2', 'level3'].includes(record.fxStudyStatus);
    }

    function setRecordStatus(dateStr, key, value) {
      const base = getRecord(dateStr);
      state.records[dateStr] = {
        ...base,
        [key]: value,
        updatedAt: new Date().toISOString(),
      };
      saveRecords();
      render();
    }

    function resetRecord(dateStr) {
      state.records[dateStr] = emptyRecord(dateStr);
      saveRecords();
      render();
    }

    function getMonthDates(monthDate) {
      const start = startOfMonth(monthDate);
      const end = endOfMonth(monthDate);
      const startGrid = new Date(start);
      startGrid.setDate(start.getDate() - mondayIndex(start));
      const endGrid = new Date(end);
      endGrid.setDate(end.getDate() + (6 - mondayIndex(end)));
      const days = [];
      for (let d = new Date(startGrid); d <= endGrid; d.setDate(d.getDate() + 1)) {
        days.push(new Date(d));
      }
      return days;
    }

    function getMonthRecords() {
      const prefix = `${state.currentMonth.getFullYear()}-${String(state.currentMonth.getMonth() + 1).padStart(2, '0')}`;
      return Object.values(state.records)
        .filter(r => r.date.startsWith(prefix))
        .sort((a, b) => a.date.localeCompare(b.date));
    }

    function summarizeMonth() {
      const monthRecords = getMonthRecords();
      return {
        alcohol: monthRecords.filter(r => r.noAlcoholStatus === 'success').length,
        workout: monthRecords.filter(workoutPositive).length,
        fx: monthRecords.filter(fxPositive).length,
        missing: monthRecords.filter(r => hasMissing(r, r.date)).length,
        workoutBreakdown: {
          '筋トレ': monthRecords.filter(r => r.workoutStatus === 'basic').length,
          '全身': monthRecords.filter(r => r.workoutStatus === 'fullBody').length,
          '脚': monthRecords.filter(r => r.workoutStatus === 'legs').length,
          '腹筋': monthRecords.filter(r => r.workoutStatus === 'abs').length,
        },
        fxBreakdown: {
          '○': monthRecords.filter(r => r.fxStudyStatus === 'level1').length,
          '○○': monthRecords.filter(r => r.fxStudyStatus === 'level2').length,
          '○○○': monthRecords.filter(r => r.fxStudyStatus === 'level3').length,
        },
      };
    }

    function sortedRecords() {
      return Object.values(state.records).sort((a, b) => a.date.localeCompare(b.date));
    }

    function recordsForRange(mode) {
      if (mode === 'month') return getMonthRecords();
      if (mode === 'all') return sortedRecords();
      const start = $('rangeStart').value;
      const end = $('rangeEnd').value;
      return sortedRecords().filter(r => r.date >= start && r.date <= end);
    }

    function escapeCsv(val) {
      const t = String(val ?? '');
      return /[",\n]/.test(t) ? '"' + t.replace(/"/g, '""') + '"' : t;
    }

    function buildCsv(records) {
      const rows = [
        ['日付', '禁酒', '筋トレ', 'FX勉強'],
        ...records.map(r => [
          r.date,
          displayMap.noAlcoholStatus[r.noAlcoholStatus],
          displayMap.workoutStatus[r.workoutStatus],
          displayMap.fxStudyStatus[r.fxStudyStatus],
        ]),
      ];
      return rows.map(row => row.map(escapeCsv).join(',')).join('\n');
    }

    function buildGuide() {
      return [
        'このCSVの列定義：',
        '- 日付：YYYY-MM-DD',
        '- 禁酒：達成 / 未達 / 未入力',
        '- 筋トレ：未入力 / なし / 筋トレ / 筋トレ:全身 / 筋トレ:脚 / 筋トレ:腹筋',
        '- FX勉強：未入力 / なし / FX勉強○ / FX勉強○○ / FX勉強○○○',
        '',
        '分析時の注意：',
        '- 未入力は未記録であり、実施なしとは別です。',
        '- 禁酒達成日数は「達成」のみを集計します。',
        '- 筋トレ実施日数は「筋トレ / 筋トレ:全身 / 筋トレ:脚 / 筋トレ:腹筋」のみを集計し、「なし」「未入力」は集計しません。',
        '- FX勉強実施日数は「FX勉強○ / FX勉強○○ / FX勉強○○○」のみを集計し、「なし」「未入力」は集計しません。',
      ].join('\n');
    }

    function download(filename, content, type) {
      const blob = new Blob([content], { type });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      URL.revokeObjectURL(url);
    }

    async function copyText(text, message) {
      try {
        await navigator.clipboard.writeText(text);
        showToast(message || 'コピーしました');
      } catch {
        showToast('コピーできませんでした');
      }
    }

    function renderCalendar() {
      $('monthTitle').textContent = jpMonth(state.currentMonth);
      const grid = $('calendarGrid');
      grid.innerHTML = '';

      getMonthDates(state.currentMonth).forEach(date => {
        const dateStr = formatDate(date);
        const record = getRecord(dateStr);
        const inMonth = date.getMonth() === state.currentMonth.getMonth();
        const missing = hasMissing(record, dateStr);
        const selected = state.selectedDate === dateStr;

        const cell = document.createElement('button');
        cell.className = `day-cell${inMonth ? '' : ' outside'}${isToday(dateStr) ? ' today' : ''}${missing ? ' missing' : ''}${selected ? ' selected' : ''}`;
        cell.type = 'button';
        cell.innerHTML = `
          <div class="day-top">
            <div class="day-num">${date.getDate()}</div>
            ${missing ? '<div class="red-dot"></div>' : '<div style="width:7px;height:7px"></div>'}
          </div>
          <div class="dots">
            ${alcoholPositive(record) ? '<div class="dot alcohol"></div>' : ''}
            ${workoutPositive(record) ? '<div class="dot workout"></div>' : ''}
            ${fxPositive(record) ? '<div class="dot fx"></div>' : ''}
            ${missing ? '<div class="dot missing"></div>' : ''}
          </div>
        `;
        cell.addEventListener('click', () => {
          state.selectedDate = dateStr;
          render();
        });
        grid.appendChild(cell);
      });
    }

    function renderSelectedDay() {
      const record = getRecord(state.selectedDate);
      $('selectedDateText').textContent = state.selectedDate;
      const pills = [];

      if (alcoholPositive(record)) pills.push('<div class="state-pill alcohol">禁酒</div>');
      else if (record.noAlcoholStatus === 'fail') pills.push('<div class="state-pill none">飲酒</div>');
      else pills.push('<div class="state-pill missing">禁酒 未入力</div>');

      if (workoutPositive(record)) pills.push(`<div class="state-pill workout">${displayMap.workoutStatus[record.workoutStatus]}</div>`);
      else if (record.workoutStatus === 'none') pills.push('<div class="state-pill none">筋トレ なし</div>');
      else pills.push('<div class="state-pill missing">筋トレ 未入力</div>');

      if (fxPositive(record)) pills.push(`<div class="state-pill fx">${displayMap.fxStudyStatus[record.fxStudyStatus]}</div>`);
      else if (record.fxStudyStatus === 'none') pills.push('<div class="state-pill none">FX勉強 なし</div>');
      else pills.push('<div class="state-pill missing">FX勉強 未入力</div>');

      $('selectedPills').innerHTML = pills.join('');

      renderChipGroup('alcoholOptions', alcoholOptions, record.noAlcoholStatus, (value) => setRecordStatus(state.selectedDate, 'noAlcoholStatus', value), 'two');
      renderChipGroup('workoutOptions', workoutOptions, record.workoutStatus, (value) => setRecordStatus(state.selectedDate, 'workoutStatus', value), 'three');
      renderChipGroup('fxOptions', fxOptions, record.fxStudyStatus, (value) => setRecordStatus(state.selectedDate, 'fxStudyStatus', value), 'two');
    }

    function renderChipGroup(targetId, options, current, onClick) {
      const el = $(targetId);
      el.innerHTML = '';
      options.forEach(opt => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = `chip-btn${current === opt.value ? ' active' : ''}`;
        btn.textContent = opt.label;
        btn.addEventListener('click', () => onClick(opt.value));
        el.appendChild(btn);
      });
    }

    function renderSummary() {
      const s = summarizeMonth();
      $('statAlcohol').textContent = s.alcohol;
      $('statWorkout').textContent = s.workout;
      $('statFx').textContent = s.fx;
      $('statMissing').textContent = s.missing;

      $('workoutBreakdown').innerHTML = Object.entries(s.workoutBreakdown)
        .map(([k, v]) => `<div class="mini-pill workout">${k} ${v}日</div>`).join('');
      $('fxBreakdown').innerHTML = Object.entries(s.fxBreakdown)
        .map(([k, v]) => `<div class="mini-pill fx">${k} ${v}日</div>`).join('');
    }

    function renderTabs() {
      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.screen === state.screen);
      });
      document.querySelectorAll('.screen').forEach(screen => {
        screen.classList.toggle('active', screen.id === `screen-${state.screen}`);
      });
    }

    function render() {
      renderTabs();
      renderCalendar();
      renderSelectedDay();
      renderSummary();
    }

    function setupExportDefaults() {
      $('rangeStart').value = formatDate(startOfMonth(state.currentMonth));
      $('rangeEnd').value = formatDate(endOfMonth(state.currentMonth));
    }

    function exportCsv(mode) {
      const records = recordsForRange(mode);
      const suffix = mode === 'month'
        ? `${state.currentMonth.getFullYear()}-${String(state.currentMonth.getMonth() + 1).padStart(2, '0')}`
        : mode === 'all'
        ? 'all'
        : `${$('rangeStart').value}_to_${$('rangeEnd').value}`;
      download(`habit_log_${suffix}.csv`, buildCsv(records), 'text/csv;charset=utf-8');
      showToast('CSVを保存しました');
    }

    function exportGuide(mode) {
      const targetLabel = mode === 'month'
        ? `対象期間：${jpMonth(state.currentMonth)}`
        : mode === 'all'
        ? '対象期間：全期間'
        : `対象期間：${$('rangeStart').value} 〜 ${$('rangeEnd').value}`;
      const suffix = mode === 'month'
        ? `${state.currentMonth.getFullYear()}-${String(state.currentMonth.getMonth() + 1).padStart(2, '0')}`
        : mode === 'all'
        ? 'all'
        : `${$('rangeStart').value}_to_${$('rangeEnd').value}`;
      const text = `${targetLabel}\n\n${buildGuide()}`;
      download(`habit_log_ai_guide_${suffix}.txt`, text, 'text/plain;charset=utf-8');
      showToast('AI説明を保存しました');
    }

    function copyPrompt(mode) {
      const records = recordsForRange(mode);
      const text = [
        '以下は習慣記録CSVです。事実ベースで分析してください。推定は推定と明記してください。',
        '',
        buildGuide(),
        '',
        'CSV:',
        buildCsv(records),
      ].join('\n');
      copyText(text, '分析文をコピーしました');
    }

    function copySelectedDay() {
      const r = getRecord(state.selectedDate);
      const text = [
        `${state.selectedDate} の記録`,
        `禁酒: ${displayMap.noAlcoholStatus[r.noAlcoholStatus]}`,
        `筋トレ: ${displayMap.workoutStatus[r.workoutStatus]}`,
        `FX勉強: ${displayMap.fxStudyStatus[r.fxStudyStatus]}`,
      ].join('\n');
      copyText(text, 'この日の記録をコピーしました');
    }

    function bindEvents() {
      $('prevMonth').addEventListener('click', () => {
        state.currentMonth = addMonths(state.currentMonth, -1);
        setupExportDefaults();
        render();
      });
      $('nextMonth').addEventListener('click', () => {
        state.currentMonth = addMonths(state.currentMonth, 1);
        setupExportDefaults();
        render();
      });
      $('todayBtn').addEventListener('click', () => {
        state.currentMonth = startOfMonth(new Date());
        state.selectedDate = formatDate(new Date());
        setupExportDefaults();
        render();
      });
      $('openTodayBtn').addEventListener('click', () => {
        state.currentMonth = startOfMonth(new Date());
        state.selectedDate = formatDate(new Date());
        setupExportDefaults();
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      });
      $('resetSelectedBtn').addEventListener('click', () => {
        resetRecord(state.selectedDate);
        showToast('未入力に戻しました');
      });
      $('copyDayBtn').addEventListener('click', copySelectedDay);

      document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          state.screen = btn.dataset.screen;
          renderTabs();
        });
      });

      $('exportMonthCsv').addEventListener('click', () => exportCsv('month'));
      $('exportAllCsv').addEventListener('click', () => exportCsv('all'));
      $('exportRangeCsv').addEventListener('click', () => exportCsv('range'));
      $('exportMonthGuide').addEventListener('click', () => exportGuide('month'));
      $('exportAllGuide').addEventListener('click', () => exportGuide('all'));
      $('exportRangeGuide').addEventListener('click', () => exportGuide('range'));
      $('copyMonthPrompt').addEventListener('click', () => copyPrompt('month'));
      $('copyAllPrompt').addEventListener('click', () => copyPrompt('all'));
      $('copyRangePrompt').addEventListener('click', () => copyPrompt('range'));
    }

    function init() {
      loadRecords();
      bindEvents();
      setupExportDefaults();
      render();
    }

    init();
  </script>
</body>
</html>
